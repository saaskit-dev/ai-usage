server:
  addr: ":8080"

monitor:
  interval: "60s"

  apprise_urls:
  # Apprise URL schemes - all notification channels unified here:
  #   - "schan://your-sendkey"              # ServerChan (WeChat)
  #   - "jsons://webhook.example.com/hook"   # Custom HTTPS webhook
  #   - "json://webhook.example.com/hook"    # Custom HTTP webhook
  #   - "discord://webhook_id/token"          # Discord
  #   - "wecombot://key"                      # WeCom Bot
  #   - "tgram://bot_token/chat_id"           # Telegram
  #   - "slack://token_a/token_b/token_c"     # Slack
  rules:
    - event: depleted                          # Alert when any provider is fully depleted
    - event: probe_error                       # Alert when probe fails (API down, token expired)
    - event: threshold                         # Alert when quota drops below threshold %
      threshold: 50
    - event: threshold
      threshold: 20
    - event: reset_soon                        # Alert before depleted provider's quota resets
      before: "10m"
    # - event: status_change                   # Alert on any status change

providers:
  claude:
    enabled: true
    # 额外的凭证目录路径（默认 ~/.claude/ 自动读取）
    # 每个路径会自动调用 API 获取 email 作为标识
    paths:
      # - /Users/you/.claude-work/
      # - /Users/you/.claude-client/
  copilot:
    enabled: true
    token: ""
  cursor:
    enabled: true
    token: ""
